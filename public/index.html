<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Rezept Manager</title>
    <link rel="stylesheet" href="css/main.css">
</head>
<body>

    <nav id="nav-bar">
        <div>
            <a href="#" id="home-link">Rezept Manager</a>
            <div id="user-management-button-div" class="hidden">
                <button id="user-management-button">Benutzerverwaltung</button>
            </div>
            <div id="show-user" class="hidden">Hallo, User</div>
            <div id="logout-button-div" class="hidden">
                <button id="logout-btn">Ausloggen</button>
            </div>
        </div>
    </nav>

    <section id="login-section" class="hidden">
        <h2>Bitte anmelden</h2>
        <form id="login-form">
            <input type="text" id="username" placeholder="Benutzername" required>
            <input type="password" id="password" placeholder="Passwort" required>
            <button type="submit" id="login-btn">Einloggen</button>
        </form>
        <p id="error-msg"></p>
    </section>

    <section id="user-management-section" class="hidden">
    <h2>Benutzerverwaltung</h2>

    <div class="form-container">
        <h3>Neuen Benutzer anlegen</h3>
        <form id="add-user-form">
            <input type="text" id="new-username" placeholder="Benutzername" required>
            <input type="password" id="new-password" placeholder="Passwort" required>
            
            <select id="new-role">
                <option value="user">User</option>
                <option value="admin">Admin</option>
            </select>
            
            <button type="submit" id="save-user-btn">Speichern</button>
        </form>
        <p id="user-management-msg"></p> 
    </div>

    <hr>

    <div class="list-container">
        <h3>Alle Benutzer</h3>
        
        <ul id="user-list"></ul>
    </div>
</section>

    <section id="dashboard-section" class="hidden">
        <div class="dashboard-header">
            <h2>Meine Rezepte</h2>
            <button class="dashboard-btn" id="create-btn">+ neues Rezept</button>
        </div>
        <!-- Such- und Filteroptionen -->
        <div class="controls">
            <input type="text" id="search-input" placeholder="Rezept oder Zutat suchen...">
            <select id="filter-select">
                <option value="">Alle Kategorien</option>
                <option value="Vorspeise">Vorspeise</option>
                <option value="Hauptgericht">Hauptgericht</option>
                <option value="Dessert">Dessert</option>
                <option value="Veggie">Veggie</option>
            </select>
        </div>
        <div id="recipe-list">
            <p>Lade Rezepte...</p>
        </div>  
    </section>

    <section id="recipe_view-section" class="hidden">
        <button id="btn-back-to-dashboard" class="btn-back">← Zurück zur Übersicht</button>
        
        <div class="recipe-card detail-card">
            <div class="recipe-header">
                <h2 id="view-title">Lade...</h2>
                <div class="recipe-meta">
                    Kategorie: <span id="view-category">-</span>
                </div>
                <img id="view-image" class="recipe-img hidden" src="" alt="Rezeptbild">
            </div>

            <div class="content-grid">
                <div class="ingredients-section">
                    <h3>Zutaten</h3>
                    <ul id="view-ingredients"></ul>
                </div>
                
                <div class="instructions-section">
                    <h3>Zubereitung</h3>
                    <p id="view-instructions" class="instructions-text"></p>
                </div>
            </div>
        </div>
    </section>

    <section id="recipe_edit-section" class="hidden">
        <div class="recipe_edit-header">
        <h2 class="recipe-edit-title">Add Recipe</h2>
        </div>
        <div>
            <label for="title" class="form-label">Recipe Name</label>
            <input type="text" class="form-control" id="title" required>
        </div>
        <div>
            <label for="image-url" class="form-label">Image URL</label>
            <input type="text" class="form-control" id="image-url" placeholder="https://example.com/image.jpg">
        </div>
        <div>
            <label for="ingredients" class="form-label">Ingredients</label>
            <table id="ingredients-list">
                <thead>
                    <tr>
                        <th>Zutat</th>
                        <th>Menge</th>
                        <th>Einheit</th>
                    </tr>
                </thead>
                <tbody id="ingredients-tbody">
                </tbody>
            </table>
            <div class="ingredient-input-row">
                <input type="text" class="form-control" id="ingredients" placeholder="Zutat" required>
                <input type="number" class="form-control" id="ingredient-quantity" placeholder="Menge" min="0" step="0.1">
                <select id="ingredient-unit" class="form-control">
                    <option value="g">Gramm (g)</option>
                    <option value="kg">Kilogramm (kg)</option>
                    <option value="ml">Milliliter (ml)</option>
                    <option value="l">Liter (l)</option>
                    <option value="tsp">Teelöffel (TL)</option>
                    <option value="tbsp">Esslöffel (EL)</option>
                    <option value="cup">Tasse</option>
                    <option value="stk">Stück</option>
                </select>
            </div>
            <button id="add-ingredient-btn">+ Add Ingredient</button>
            <button id="clear-ingredients-btn">Clear Ingredients</button>
        </div>
        <div>
            <label for="instructions" class="form-label">Instructions</label>
            <textarea class="form-control" id="instructions" rows="5" required></textarea>
        </div>
        <div>
            <label for="category" class="form-label">Category</label>
            <select id="category" class="form-select">
                <option value="keine Kategorie">Uncategorized</option>
                <option value="Veggie">Veggie</option>
                <option value="Dessert">Dessert</option>
                <option value="Hauptgericht">Hauptgericht</option>
                <option value="Vorspeise">Vorspeise</option>
            </select>
        </div>
        <div>
            <button id="save_recipe-btn">Rezept speichern</button>
            <button id="cancel_edit-btn">Abbrechen</button>
        </div>
    </section>

    <script type="module" src="js/main.js"></script>
</body>
</html>
